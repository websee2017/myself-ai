<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MyAI Login</title>

<link rel="stylesheet" href="auth.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<div class="box">

  <div class="logo">
    <h1>MyAI</h1>
    <p>AI Vision Assistant</p>
  </div>

  <input
    id="email"
    type="email"
    placeholder="Email">

  <input
    id="password"
    type="password"
    placeholder="Password">

  <button id="loginBtn" onclick="login()">
    Login
  </button>

  <div class="link" onclick="forgotPassword()">
    Forgot Password?
  </div>

</div>

<script>

const sb = supabase.createClient(
  "https://zfdbptikvcyhrqtqdkxj.supabase.co",
  "sb_publishable_Jr7ICxOpjLZP78Ogwuwrcg_OBRE5eeG"
);

// 自动检测登录状态
check();

async function check() {

  const { data:{ session } } =
    await sb.auth.getSession();

  if(session){
    window.location.href = "chat.html";
  }
}

// 回车登录
document.addEventListener("keydown",(e)=>{

  if(e.key === "Enter"){
    login();
  }

});

// 登录
async function login(){

  const btn = document.getElementById("loginBtn");

  const email =
    document.getElementById("email").value.trim();

  const password =
    document.getElementById("password").value;

  if(!email || !password){
    alert("Please enter email and password");
    return;
  }

  btn.disabled = true;
  btn.innerText = "Signing in...";

  const { error } =
    await sb.auth.signInWithPassword({
      email,
      password
    });

  btn.disabled = false;
  btn.innerText = "Login";

  if(error){
    alert(error.message);
    return;
  }

  window.location.href = "chat.html";
}

// 忘记密码
async function forgotPassword(){

  const email =
    document.getElementById("email").value.trim();

  if(!email){
    alert("Please enter your email first");
    return;
  }

  const { error } =
    await sb.auth.resetPasswordForEmail(
      email,
      {
        redirectTo:
        "https://myai.hippo1996.top/change-password.html"
      }
    );

  if(error){
    alert(error.message);
  }else{
    alert(
      "Password reset email sent. Please check your inbox."
    );
  }
}

</script>

</body>
</html>
